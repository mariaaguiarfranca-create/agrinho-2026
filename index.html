<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Semente → Árvore → Cidade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Semente → Árvore → Cidade</h1>

    <div class="processo">

        <div class="etapa" id="semente">
            🌱
            <span>Semente</span>
        </div>

        <div class="seta">➜</div>

        <div class="etapa" id="arvore">
            🌳
            <span>Árvore</span>
        </div>

        <div class="seta">➜</div>

        <div class="etapa" id="cidade">
            🏙️
            <span>Cidade</span>
        </div>

    </div>

    <button id="btn">Iniciar Evolução</button>

    <p id="msg"></p>

</div>

<script src="script.js"></script>
</body>
</html>
